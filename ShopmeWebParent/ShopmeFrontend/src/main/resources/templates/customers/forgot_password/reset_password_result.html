<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: page_head(${'Reset Password Result'})}"></head>
<body>

<div class="container-fluid">
    <div th:replace="~{fragments :: top_navbar}"></div>

    <div th:if="${param.success}" class="text-center my-4">
        <h2>Reset Password Success</h2>
        <h4>You have successfully reset your password.</h4>
        <p><a th:href="@{/login}" class="text-decoration-none link-primary fs-5 fw-bold">Login Now</a></p>
    </div>

    <div th:if="${param.error}" class="text-center my-4">
        <h2>Reset Password Error</h2>
        <h4>Invalid reset password token.</h4>
    </div>

    <div th:replace="~{fragments :: footer_navbar}"></div>
</div>
</body>
</html>
